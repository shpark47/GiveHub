<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<div>
		<h1>아이디 찾기</h1>
		<h3>회원가입 시 입력한 정보로 아이디를 찾을 수 있습니다.</h3>
		<div>
			<span>입력하신 정보로 총 [[${count}]] 개의 아이디가 검색되었습니다.</span>
			<p>가입하신 아이디는</p> <div>[[${session.loginUser.id}]] ( [[${createDate}]] 가입) </div> 입니다.
		</div>
		<div>비밀번호가 생각나지 않으신가요? <button th:onclick="|location.href='@{#}'|">비밀번호찾기</button></div>
		<div>가입하신 아이디가 없다면, 회원가입을 진행해주세요. <button th:onclick="|location.href='@{#}'|">회원가입</button></div>
	</div>
	<div>
		<button th:onclick="|location.href='@{Login}'|">로그인 하러 가기</button>
	</div>
	
</body>
</html>
